apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: observability
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
    ingester:
      trace_idle_period: 10s
      max_block_bytes: 1000000
      max_block_duration: 5m
    compactor:
      compaction:
        block_retention: 24h
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: observability
data:
  loki.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
    common:
      path_prefix: /var/loki
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    storage_config:
      filesystem:
        directory: /var/loki/chunks
    limits_config:
      allow_structured_metadata: true
      volume_enabled: true
      retention_period: 24h
    compactor:
      working_directory: /var/loki/compactor
      retention_enabled: true
      delete_request_store: filesystem
    ruler:
      storage:
        type: local
        local:
          directory: /var/loki/rules
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-config
  namespace: observability
data:
  mimir.yaml: |
    target: all
    multitenancy_enabled: false
    server:
      http_listen_port: 9009
      grpc_listen_port: 9095
    common:
      storage:
        backend: filesystem
        filesystem:
          dir: /data/mimir
    blocks_storage:
      backend: filesystem
      filesystem:
        dir: /data/mimir/blocks
      tsdb:
        dir: /data/mimir/tsdb
    compactor:
      data_dir: /data/mimir/compactor
    ruler_storage:
      backend: filesystem
      filesystem:
        dir: /data/mimir/ruler
    store_gateway:
      sharding_ring:
        replication_factor: 1
    ingester:
      ring:
        replication_factor: 1
        kvstore:
          store: inmemory
    activity_tracker:
      filepath: /data/mimir/activity.log
    limits:
      native_histograms_ingestion_enabled: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: observability
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Mimir
        uid: mimir
        type: prometheus
        access: proxy
        url: http://mimir.observability.svc.cluster.local:9009/prometheus
        isDefault: true
        jsonData:
          timeInterval: 5s
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki.observability.svc.cluster.local:3100
        jsonData:
          derivedFields:
            - name: trace_id
              matcherRegex: '"trace_id":"([a-f0-9]+)"'
              datasourceUid: tempo
              url: '$${__value.raw}'
      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://tempo.observability.svc.cluster.local:3200
        jsonData:
          serviceMap:
            datasourceUid: mimir
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: -5m
            spanEndTimeShift: 5m
            filterByTraceID: true
            tags:
              - key: service.name
                value: service_name
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: ecommerce-lab
        orgId: 1
        folder: OpenTelemetry Lab
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: observability
data:
  red-metrics.json: |
    {
      "uid": "otel-red",
      "title": "E-commerce RED Metrics",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "tags": ["opentelemetry", "red", "lab"],
      "time": {"from": "now-30m", "to": "now"},
      "panels": [
        {
          "type": "timeseries",
          "title": "Rate por serviço",
          "gridPos": {"x": 0, "y": 0, "w": 8, "h": 8},
          "targets": [{"datasource": {"uid": "mimir"}, "expr": "sum by (service_name) (rate(traces_spanmetrics_calls_total[1m]))", "legendFormat": "{{service_name}}"}]
        },
        {
          "type": "timeseries",
          "title": "Errors por serviço",
          "gridPos": {"x": 8, "y": 0, "w": 8, "h": 8},
          "targets": [{"datasource": {"uid": "mimir"}, "expr": "sum by (service_name) (rate(traces_spanmetrics_calls_total{status_code=\"STATUS_CODE_ERROR\"}[1m]))", "legendFormat": "{{service_name}}"}]
        },
        {
          "type": "timeseries",
          "title": "Duration p95 por serviço",
          "gridPos": {"x": 16, "y": 0, "w": 8, "h": 8},
          "targets": [{"datasource": {"uid": "mimir"}, "expr": "histogram_quantile(0.95, sum by (service_name, le) (rate(traces_spanmetrics_duration_milliseconds_bucket[5m])))", "legendFormat": "{{service_name}}"}]
        },
        {
          "type": "logs",
          "title": "Logs estruturados",
          "gridPos": {"x": 0, "y": 8, "w": 24, "h": 8},
          "targets": [{"datasource": {"uid": "loki"}, "expr": "{service_name=~\"frontend|catalog|checkout|inventory\"}"}]
        }
      ]
    }
  postgres.json: |
    {
      "uid": "postgres-lab",
      "title": "PostgreSQL Observability",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "15s",
      "tags": ["postgres", "opentelemetry", "lab"],
      "time": {"from": "now-30m", "to": "now"},
      "panels": [
        {
          "type": "timeseries",
          "title": "Conexões PostgreSQL",
          "gridPos": {"x": 0, "y": 0, "w": 12, "h": 8},
          "targets": [{"datasource": {"uid": "mimir"}, "expr": "pg_stat_activity_count", "legendFormat": "{{state}}"}]
        },
        {
          "type": "timeseries",
          "title": "Queries por operação observadas em spans",
          "gridPos": {"x": 12, "y": 0, "w": 12, "h": 8},
          "targets": [{"datasource": {"uid": "mimir"}, "expr": "sum by (span_name) (rate(traces_spanmetrics_calls_total{span_name=~\"db.*\"}[1m]))", "legendFormat": "{{span_name}}"}]
        }
      ]
    }
  shop-performance.json: |
    {
      "uid": "shagohod-performance",
      "title": "Shagohod Shop - Service Performance",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "tags": ["shagohod-shop", "opentelemetry", "services", "performance"],
      "time": {"from": "now-30m", "to": "now"},
      "templating": {
        "list": [
          {
            "name": "service",
            "type": "query",
            "datasource": {"uid": "mimir"},
            "query": "label_values(traces_spanmetrics_calls_total, service_name)",
            "refresh": 1,
            "includeAll": true,
            "multi": true,
            "current": {"selected": true, "text": "All", "value": "$__all"}
          }
        ]
      },
      "panels": [
        {
          "type": "stat",
          "title": "Requests/s da loja",
          "gridPos": {"x": 0, "y": 0, "w": 6, "h": 4},
          "targets": [{"datasource": {"uid": "mimir"}, "expr": "sum(rate(traces_spanmetrics_calls_total{service_name=~\"$service\"}[5m]))", "legendFormat": "rps"}],
          "fieldConfig": {"defaults": {"unit": "reqps", "decimals": 2}, "overrides": []}
        },
        {
          "type": "stat",
          "title": "Erros/s",
          "gridPos": {"x": 6, "y": 0, "w": 6, "h": 4},
          "targets": [{"datasource": {"uid": "mimir"}, "expr": "sum(rate(traces_spanmetrics_calls_total{service_name=~\"$service\", status_code=\"STATUS_CODE_ERROR\"}[5m]))", "legendFormat": "errors"}],
          "fieldConfig": {"defaults": {"unit": "ops", "decimals": 2, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 0.01}]}}, "overrides": []}
        },
        {
          "type": "stat",
          "title": "Taxa de erro",
          "gridPos": {"x": 12, "y": 0, "w": 6, "h": 4},
          "targets": [{"datasource": {"uid": "mimir"}, "expr": "100 * sum(rate(traces_spanmetrics_calls_total{service_name=~\"$service\", status_code=\"STATUS_CODE_ERROR\"}[5m])) / clamp_min(sum(rate(traces_spanmetrics_calls_total{service_name=~\"$service\"}[5m])), 0.001)", "legendFormat": "error %"}],
          "fieldConfig": {"defaults": {"unit": "percent", "decimals": 2, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 1}, {"color": "red", "value": 5}]}}, "overrides": []}
        },
        {
          "type": "stat",
          "title": "Latência p95 geral",
          "gridPos": {"x": 18, "y": 0, "w": 6, "h": 4},
          "targets": [{"datasource": {"uid": "mimir"}, "expr": "histogram_quantile(0.95, sum by (le) (rate(traces_spanmetrics_duration_milliseconds_bucket{service_name=~\"$service\"}[5m])))", "legendFormat": "p95"}],
          "fieldConfig": {"defaults": {"unit": "ms", "decimals": 1, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 250}, {"color": "red", "value": 750}]}}, "overrides": []}
        },
        {
          "type": "timeseries",
          "title": "Throughput por serviço",
          "gridPos": {"x": 0, "y": 4, "w": 12, "h": 8},
          "targets": [{"datasource": {"uid": "mimir"}, "expr": "sum by (service_name) (rate(traces_spanmetrics_calls_total{service_name=~\"$service\"}[1m]))", "legendFormat": "{{service_name}}"}],
          "fieldConfig": {"defaults": {"unit": "reqps", "decimals": 2}, "overrides": []}
        },
        {
          "type": "timeseries",
          "title": "Erros por serviço",
          "gridPos": {"x": 12, "y": 4, "w": 12, "h": 8},
          "targets": [{"datasource": {"uid": "mimir"}, "expr": "sum by (service_name) (rate(traces_spanmetrics_calls_total{service_name=~\"$service\", status_code=\"STATUS_CODE_ERROR\"}[1m]))", "legendFormat": "{{service_name}}"}],
          "fieldConfig": {"defaults": {"unit": "ops", "decimals": 2}, "overrides": []}
        },
        {
          "type": "timeseries",
          "title": "Latência p95 por serviço",
          "gridPos": {"x": 0, "y": 12, "w": 12, "h": 8},
          "targets": [{"datasource": {"uid": "mimir"}, "expr": "histogram_quantile(0.95, sum by (service_name, le) (rate(traces_spanmetrics_duration_milliseconds_bucket{service_name=~\"$service\"}[5m])))", "legendFormat": "{{service_name}}"}],
          "fieldConfig": {"defaults": {"unit": "ms", "decimals": 1}, "overrides": []}
        },
        {
          "type": "timeseries",
          "title": "Latência p50 por serviço",
          "gridPos": {"x": 12, "y": 12, "w": 12, "h": 8},
          "targets": [{"datasource": {"uid": "mimir"}, "expr": "histogram_quantile(0.50, sum by (service_name, le) (rate(traces_spanmetrics_duration_milliseconds_bucket{service_name=~\"$service\"}[5m])))", "legendFormat": "{{service_name}}"}],
          "fieldConfig": {"defaults": {"unit": "ms", "decimals": 1}, "overrides": []}
        },
        {
          "type": "bargauge",
          "title": "Top operações por volume",
          "gridPos": {"x": 0, "y": 20, "w": 12, "h": 8},
          "targets": [{"datasource": {"uid": "mimir"}, "expr": "topk(10, sum by (service_name, span_name) (rate(traces_spanmetrics_calls_total{service_name=~\"$service\"}[5m])))", "legendFormat": "{{service_name}} / {{span_name}}"}],
          "fieldConfig": {"defaults": {"unit": "reqps", "decimals": 2}, "overrides": []}
        },
        {
          "type": "bargauge",
          "title": "Operações mais lentas p95",
          "gridPos": {"x": 12, "y": 20, "w": 12, "h": 8},
          "targets": [{"datasource": {"uid": "mimir"}, "expr": "topk(10, histogram_quantile(0.95, sum by (service_name, span_name, le) (rate(traces_spanmetrics_duration_milliseconds_bucket{service_name=~\"$service\"}[5m]))))", "legendFormat": "{{service_name}} / {{span_name}}"}],
          "fieldConfig": {"defaults": {"unit": "ms", "decimals": 1}, "overrides": []}
        },
        {
          "type": "timeseries",
          "title": "Status HTTP por serviço",
          "gridPos": {"x": 0, "y": 28, "w": 12, "h": 8},
          "targets": [{"datasource": {"uid": "mimir"}, "expr": "sum by (service_name, http_response_status_code) (rate(traces_spanmetrics_calls_total{service_name=~\"$service\", http_response_status_code!=\"\"}[1m]))", "legendFormat": "{{service_name}} HTTP {{http_response_status_code}}"}],
          "fieldConfig": {"defaults": {"unit": "reqps", "decimals": 2}, "overrides": []}
        },
        {
          "type": "timeseries",
          "title": "Performance por produto",
          "gridPos": {"x": 12, "y": 28, "w": 12, "h": 8},
          "targets": [{"datasource": {"uid": "mimir"}, "expr": "sum by (product_id) (rate(traces_spanmetrics_calls_total{product_id!=\"\"}[5m]))", "legendFormat": "{{product_id}}"}],
          "fieldConfig": {"defaults": {"unit": "reqps", "decimals": 2}, "overrides": []}
        },
        {
          "type": "bargauge",
          "title": "Checkout por cenário",
          "gridPos": {"x": 0, "y": 36, "w": 12, "h": 8},
          "targets": [{"datasource": {"uid": "mimir"}, "expr": "sum by (checkout_scenario) (rate(traces_spanmetrics_calls_total{checkout_scenario!=\"\"}[5m]))", "legendFormat": "{{checkout_scenario}}"}],
          "fieldConfig": {"defaults": {"unit": "reqps", "decimals": 2}, "overrides": []}
        },
        {
          "type": "timeseries",
          "title": "Queries PostgreSQL observadas por spans",
          "gridPos": {"x": 12, "y": 36, "w": 12, "h": 8},
          "targets": [{"datasource": {"uid": "mimir"}, "expr": "sum by (span_name, db_operation) (rate(traces_spanmetrics_calls_total{db_system=\"postgresql\"}[1m]))", "legendFormat": "{{span_name}} {{db_operation}}"}],
          "fieldConfig": {"defaults": {"unit": "reqps", "decimals": 2}, "overrides": []}
        },
        {
          "type": "timeseries",
          "title": "Conexões PostgreSQL",
          "gridPos": {"x": 0, "y": 44, "w": 24, "h": 8},
          "targets": [{"datasource": {"uid": "mimir"}, "expr": "sum by (state) (pg_stat_activity_count)", "legendFormat": "{{state}}"}],
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0}, "overrides": []}
        }
      ]
    }
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: observability
spec:
  selector:
    app: tempo
  ports:
    - name: http
      port: 3200
      targetPort: 3200
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
    spec:
      containers:
        - name: tempo
          image: grafana/tempo:2.6.1
          args: ["-config.file=/etc/tempo/tempo.yaml"]
          ports:
            - containerPort: 3200
            - containerPort: 4317
            - containerPort: 4318
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
            - name: data
              mountPath: /var/tempo
      volumes:
        - name: config
          configMap:
            name: tempo-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: observability
spec:
  selector:
    app: loki
  ports:
    - name: http
      port: 3100
      targetPort: 3100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
        - name: loki
          image: grafana/loki:3.2.1
          args: ["-config.file=/etc/loki/loki.yaml"]
          ports:
            - containerPort: 3100
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: data
              mountPath: /var/loki
      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mimir
  namespace: observability
spec:
  selector:
    app: mimir
  ports:
    - name: http
      port: 9009
      targetPort: 9009
    - name: grpc
      port: 9095
      targetPort: 9095
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimir
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mimir
  template:
    metadata:
      labels:
        app: mimir
    spec:
      containers:
        - name: mimir
          image: grafana/mimir:2.14.3
          args: ["-config.file=/etc/mimir/mimir.yaml"]
          ports:
            - containerPort: 9009
            - containerPort: 9095
          volumeMounts:
            - name: config
              mountPath: /etc/mimir
            - name: data
              mountPath: /data/mimir
      volumes:
        - name: config
          configMap:
            name: mimir-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: observability
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.3.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
          volumeMounts:
            - name: provisioning
              mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
              subPath: datasources.yaml
            - name: provisioning
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: provisioning
          configMap:
            name: grafana-provisioning
        - name: dashboards
          configMap:
            name: grafana-dashboards
