apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observability
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      prometheus:
        config:
          scrape_configs:
            - job_name: postgres-exporter
              scrape_interval: 15s
              static_configs:
                - targets:
                    - postgres-exporter.ecommerce.svc.cluster.local:9187
            - job_name: otel-collector
              scrape_interval: 15s
              static_configs:
                - targets:
                    - 127.0.0.1:8888
      filelog:
        include:
          - /var/log/pods/ecommerce_*/*/*.log
        start_at: end
        include_file_path: true
        operators:
          - type: container

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 400
        spike_limit_mib: 100
      resource/lab:
        attributes:
          - key: deployment.environment.name
            value: kind-lab
            action: upsert
          - key: lab.name
            value: otel-lgtm-ecommerce
            action: upsert
      attributes/sanitize:
        actions:
          - key: http.request.header.authorization
            action: delete
          - key: user.password
            action: delete
      transform/logs:
        error_mode: ignore
        log_statements:
          - context: log
            statements:
              - merge_maps(attributes, ParseJSON(body), "upsert") where IsMatch(body, "^\\{")
              - set(attributes["service_name"], attributes["service.name"]) where attributes["service.name"] != nil
      batch:
        timeout: 5s
        send_batch_size: 512

    connectors:
      spanmetrics:
        namespace: traces.spanmetrics
        histogram:
          explicit:
            buckets: [10ms, 50ms, 100ms, 250ms, 500ms, 1s, 2s]
        dimensions:
          - name: http.method
          - name: http.route
          - name: http.response.status_code
          - name: db.system
          - name: db.operation
          - name: shop.name
          - name: product.id
          - name: checkout.scenario
        exemplars:
          enabled: true
        metrics_flush_interval: 15s

    exporters:
      otlp/tempo:
        endpoint: tempo.observability.svc.cluster.local:4317
        tls:
          insecure: true
      otlphttp/loki:
        endpoint: http://loki.observability.svc.cluster.local:3100/otlp
      prometheusremotewrite/mimir:
        endpoint: http://mimir.observability.svc.cluster.local:9009/api/v1/push
        tls:
          insecure: true
      debug:
        verbosity: basic

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      zpages:
        endpoint: 0.0.0.0:55679

    service:
      telemetry:
        resource:
          service.name: otel-collector
          deployment.environment.name: kind-lab
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
      extensions: [health_check, zpages]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resource/lab, attributes/sanitize, batch]
          exporters: [otlp/tempo, spanmetrics]
        metrics:
          receivers: [otlp, prometheus, spanmetrics]
          processors: [memory_limiter, resource/lab, batch]
          exporters: [prometheusremotewrite/mimir]
        logs:
          receivers: [otlp, filelog]
          processors: [memory_limiter, resource/lab, transform/logs, batch]
          exporters: [otlphttp/loki]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: observability
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: observability
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: health
      port: 13133
      targetPort: 13133
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      serviceAccountName: otel-collector
      containers:
        - name: collector
          image: otel/opentelemetry-collector-contrib:0.111.0
          args: ["--config=/etc/otelcol/collector.yaml"]
          ports:
            - containerPort: 4317
            - containerPort: 4318
            - containerPort: 13133
            - containerPort: 8888
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
            - name: podlogs
              mountPath: /var/log/pods
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
        - name: podlogs
          hostPath:
            path: /var/log/pods
            type: Directory
