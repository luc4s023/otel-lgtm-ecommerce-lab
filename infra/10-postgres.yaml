apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: ecommerce
type: Opaque
stringData:
  POSTGRES_DB: shop
  POSTGRES_USER: shop
  POSTGRES_PASSWORD: shop
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: ecommerce
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS products (
      id TEXT PRIMARY KEY,
      name TEXT NOT NULL,
      price_cents INTEGER NOT NULL
    );

    CREATE TABLE IF NOT EXISTS inventory (
      product_id TEXT PRIMARY KEY REFERENCES products(id),
      quantity INTEGER NOT NULL
    );

    DELETE FROM inventory WHERE product_id IN ('sku-astro-mug', 'sku-otel-shirt', 'sku-kind-sticker');
    DELETE FROM products WHERE id IN ('sku-astro-mug', 'sku-otel-shirt', 'sku-kind-sticker');

    INSERT INTO products (id, name, price_cents) VALUES
      ('sku-shagohod', 'Shagohod', 49900000),
      ('sku-tx-55', 'Metal Gear TX-55', 24900000),
      ('sku-metal-gear-d', 'Metal Gear D', 32900000),
      ('sku-rex', 'Metal Gear REX', 79900000),
      ('sku-ray', 'Metal Gear RAY', 69900000),
      ('sku-sahelanthropus', 'Sahelanthropus', 99900000)
    ON CONFLICT (id) DO UPDATE SET
      name = EXCLUDED.name,
      price_cents = EXCLUDED.price_cents;

    INSERT INTO inventory (product_id, quantity) VALUES
      ('sku-shagohod', 3),
      ('sku-tx-55', 4),
      ('sku-metal-gear-d', 2),
      ('sku-rex', 5),
      ('sku-ray', 6),
      ('sku-sahelanthropus', 0)
    ON CONFLICT (product_id) DO UPDATE SET quantity = EXCLUDED.quantity;
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: ecommerce
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: ecommerce
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: init
              mountPath: /docker-entrypoint-initdb.d
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "shop"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: init
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: ecommerce
  labels:
    app: postgres-exporter
spec:
  ports:
    - name: metrics
      port: 9187
      targetPort: 9187
  selector:
    app: postgres-exporter
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
        - name: exporter
          image: prometheuscommunity/postgres-exporter:v0.15.0
          ports:
            - containerPort: 9187
          env:
            - name: DATA_SOURCE_NAME
              value: postgresql://shop:shop@postgres.ecommerce.svc.cluster.local:5432/shop?sslmode=disable
---
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-seed-shagohod
  namespace: ecommerce
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app: postgres-seed-shagohod
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: postgres:16-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres.ecommerce.svc.cluster.local -U shop -d shop; do sleep 2; done
              psql -h postgres.ecommerce.svc.cluster.local -U shop -d shop <<'SQL'
              DELETE FROM inventory WHERE product_id IN ('sku-astro-mug', 'sku-otel-shirt', 'sku-kind-sticker');
              DELETE FROM products WHERE id IN ('sku-astro-mug', 'sku-otel-shirt', 'sku-kind-sticker');

              INSERT INTO products (id, name, price_cents) VALUES
                ('sku-shagohod', 'Shagohod', 49900000),
                ('sku-tx-55', 'Metal Gear TX-55', 24900000),
                ('sku-metal-gear-d', 'Metal Gear D', 32900000),
                ('sku-rex', 'Metal Gear REX', 79900000),
                ('sku-ray', 'Metal Gear RAY', 69900000),
                ('sku-sahelanthropus', 'Sahelanthropus', 99900000)
              ON CONFLICT (id) DO UPDATE SET
                name = EXCLUDED.name,
                price_cents = EXCLUDED.price_cents;

              INSERT INTO inventory (product_id, quantity) VALUES
                ('sku-shagohod', 3),
                ('sku-tx-55', 4),
                ('sku-metal-gear-d', 2),
                ('sku-rex', 5),
                ('sku-ray', 6),
                ('sku-sahelanthropus', 0)
              ON CONFLICT (product_id) DO UPDATE SET quantity = EXCLUDED.quantity;
              SQL
